<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Game Over Tracker</title>
    
    <!-- Modern PWA Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Game Over">
    <meta name="theme-color" content="#0f172a">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">
    
    <!-- App Icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png">
    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png">

    <!-- Tailwind CSS (Development CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    
    <!-- Stable Production CDNs -->
    <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { -webkit-tap-highlight-color: transparent; background-color: #f8fafc; }
        html.dark body { background-color: #020617; }
        #root:empty { display: none; }
        .loading-fallback {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; font-family: sans-serif; background: #0f172a; color: white;
        }
    </style>
</head>
<body>
    <div id="root">
        <div class="loading-fallback">
            <div style="font-weight: 900; font-style: italic; font-size: 24px; text-transform: uppercase; letter-spacing: -1px;">Game Over</div>
            <div style="font-size: 10px; color: #ef4444; margin-top: 8px; font-weight: bold; letter-spacing: 2px;">INITIALIZING SYSTEM...</div>
        </div>
    </div>

    <script type="text/babel">
        const initApp = () => {
            if (typeof window.Recharts === 'undefined' || typeof window.React === 'undefined') {
                setTimeout(initApp, 100);
                return;
            }
            renderApp();
        };

        const renderApp = () => {
            const { useState, useEffect, useMemo } = React;
            const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Legend, ComposedChart, Scatter } = Recharts;
            
            const Icons = {
                Dumbbell: () => (
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m6.5 6.5 11 11"/><path d="m10 10 5.5 5.5"/><path d="m3 7 4 4"/><path d="m9 3 4 4"/><path d="m17 13 4 4"/><path d="m13 17 4 4"/></svg>
                ),
                Save: () => (
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                ),
                Calendar: () => (
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>
                ),
                BarChart3: () => (
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>
                ),
                Trash: () => (
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                ),
                Chevron: () => (
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>
                ),
                Gear: () => (
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
                )
            };

            const APP_ID = 'game-over-tracker-v5';
            const APP_VERSION = '4.0.0';

            // Step 1: Get effective exercise name (swap or original)
            const getEffectiveName = (phase, day, originalName, swaps) => {
                return swaps[`${phase}-${day}-${originalName}`] || originalName;
            };

            // Rep range color coding
            const getRepColorClass = (phase, repValue) => {
                if (!repValue && repValue !== 0) return 'bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-white';
                const r = parseInt(repValue);
                if (isNaN(r)) return 'bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-white';
                const ranges = { 1: [12, 15], 2: [6, 10], 3: [4, 6] };
                const [min, max] = ranges[phase];
                if (r < min) return 'bg-red-100 dark:bg-red-900/40 text-red-700 dark:text-red-400';
                if (r > max) return 'bg-blue-100 dark:bg-blue-900/40 text-blue-700 dark:text-blue-400';
                return 'bg-green-100 dark:bg-green-900/40 text-green-700 dark:text-green-400';
            };

            // Step 2: SwapPanel bottom-sheet component
            const SwapPanel = ({ target, customExercises, dayExercises, onSelect, onRestore, onAddCustom, onRemoveCustom, onClose, darkMode }) => {
                const [draft, setDraft] = React.useState('');
                const currentDayNames = dayExercises.map(ex => ex.name);
                const available = customExercises.filter(name => !currentDayNames.includes(name) && name !== target.originalName);

                return (
                    <div className="fixed inset-0 z-50 flex items-end justify-center">
                        <div className="absolute inset-0 bg-black/50" onClick={onClose} />
                        <div className="relative w-full max-w-md bg-white dark:bg-slate-900 rounded-t-3xl p-6 pb-8 max-h-[70vh] overflow-y-auto">
                            <div className="w-12 h-1.5 bg-slate-300 dark:bg-slate-700 rounded-full mx-auto mb-4" />
                            <h3 className="text-sm font-black text-slate-800 dark:text-slate-100 uppercase mb-1">Swap Exercise</h3>
                            <p className="text-xs text-slate-400 mb-4">Replace <span className="font-bold text-slate-600 dark:text-slate-300">{target.originalName}</span></p>

                            {target.isSwapped && (
                                <button onClick={onRestore} className="w-full mb-4 p-3 bg-slate-100 dark:bg-slate-800 rounded-2xl text-sm font-bold text-slate-600 dark:text-slate-300 active:scale-95 transition-transform">
                                    Restore Original
                                </button>
                            )}

                            {available.length > 0 ? (
                                <div className="space-y-2 mb-4">
                                    {available.map(name => (
                                        <div key={name} className="flex items-center gap-2">
                                            <button onClick={() => onSelect(name)} className="flex-1 p-3 bg-slate-50 dark:bg-slate-800 rounded-2xl text-sm font-bold text-slate-700 dark:text-slate-200 text-left active:scale-95 transition-transform">
                                                {name}
                                            </button>
                                            <button onClick={() => onRemoveCustom(name)} className="p-2 text-slate-400 hover:text-red-500">
                                                <Icons.Trash />
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            ) : (
                                <p className="text-xs text-slate-400 mb-4">No custom exercises yet. Add one below.</p>
                            )}

                            <div className="flex gap-2">
                                <input
                                    type="text"
                                    value={draft}
                                    onChange={(e) => setDraft(e.target.value)}
                                    placeholder="New exercise name"
                                    className="flex-1 p-3 bg-slate-50 dark:bg-slate-800 dark:text-white rounded-xl text-sm font-bold outline-none focus:ring-2 focus:ring-red-500 placeholder:text-slate-300 dark:placeholder:text-slate-600"
                                    onKeyDown={(e) => { if (e.key === 'Enter' && draft.trim()) { onAddCustom(draft.trim()); setDraft(''); } }}
                                />
                                <button onClick={() => { if (draft.trim()) { onAddCustom(draft.trim()); setDraft(''); } }} className="px-4 py-3 bg-red-600 text-white rounded-xl text-sm font-black active:scale-95 transition-transform">Add</button>
                            </div>
                        </div>
                    </div>
                );
            };

            // Migrate data from older app versions (v1-v4) into current version
            (function migrateOldData() {
                const currentLogs = localStorage.getItem(`${APP_ID}_logs`);
                const currentHistory = localStorage.getItem(`${APP_ID}_history`);
                let mergedLogs = currentLogs ? JSON.parse(currentLogs) : {};
                let mergedHistory = currentHistory ? JSON.parse(currentHistory) : [];
                let migrated = false;

                for (let v = 1; v <= 4; v++) {
                    const oldId = `game-over-tracker-v${v}`;
                    const oldLogs = localStorage.getItem(`${oldId}_logs`);
                    const oldHistory = localStorage.getItem(`${oldId}_history`);

                    if (oldLogs) {
                        const parsed = JSON.parse(oldLogs);
                        Object.keys(parsed).forEach(key => {
                            if (!mergedLogs[key]) mergedLogs[key] = parsed[key];
                        });
                        localStorage.removeItem(`${oldId}_logs`);
                        migrated = true;
                    }

                    if (oldHistory) {
                        const parsed = JSON.parse(oldHistory);
                        const existingKeys = new Set(mergedHistory.map(h => `${h.key}_${h.date}`));
                        parsed.forEach(entry => {
                            const dedupKey = `${entry.key}_${entry.date}`;
                            if (!existingKeys.has(dedupKey)) {
                                mergedHistory.push(entry);
                                existingKeys.add(dedupKey);
                            }
                        });
                        localStorage.removeItem(`${oldId}_history`);
                        migrated = true;
                    }
                }

                if (migrated) {
                    localStorage.setItem(`${APP_ID}_logs`, JSON.stringify(mergedLogs));
                    localStorage.setItem(`${APP_ID}_history`, JSON.stringify(mergedHistory));
                    console.log('[Game Over] Migrated data from older versions');
                }
            })();

            const programData = {
                1: { title: "Conditioning", targetReps: "12-15", workouts: {
                    "Monday": [{ name: "Incline Barbell Press", sets: 4 }, { name: "Flat Barbell Press", sets: 4 }, { name: "Dumbbell Flyes", sets: 4 }, { name: "Push Ups", sets: 3 }, { name: "Crunches", sets: 4 }, { name: "Reverse Crunches", sets: 4 }, { name: "Leaning Oblique Crunches", sets: 4 }],
                    "Tuesday": [{ name: "Squats", sets: 4 }, { name: "Stiff Leg Deadlift", sets: 4 }, { name: "Leg Curl", sets: 4 }, { name: "Leg Press", sets: 4 }, { name: "Leg Extension", sets: 4 }, { name: "Standing Calf Raise", sets: 4 }, { name: "Seated Calf Raise", sets: 4 }],
                    "Wednesday": [{ name: "Bent Over Barbell Row", sets: 4 }, { name: "1-Arm Dumbbell Row", sets: 4 }, { name: "Cable Pull Downs", sets: 4 }, { name: "Wide Grip Pull Downs", sets: 4 }, { name: "Dumbbell Shrugs", sets: 4 }, { name: "Hyperextensions", sets: 4 }],
                    "Friday": [{ name: "Standing Barbell Curls", sets: 4 }, { name: "Preacher Curls", sets: 4 }, { name: "Hammer Curls", sets: 3 }, { name: "Triceps Press Down", sets: 4 }, { name: "Over Head Extensions", sets: 4 }, { name: "Weighted Dips", sets: 3 }, { name: "V-ups", sets: 4 }, { name: "Leg Raises", sets: 4 }, { name: "Cable Wood Chops", sets: 4 }],
                    "Saturday": [{ name: "Dumbbell Military Press", sets: 4 }, { name: "Front DB Raise", sets: 4 }, { name: "Side Lateral Raise", sets: 4 }, { name: "Rear Delt Machine", sets: 4 }, { name: "Standing Calf Raise", sets: 4 }, { name: "Seated Calf Raise", sets: 4 }]
                }},
                2: { title: "Growth", targetReps: "6-10", workouts: {
                    "Monday": [{ name: "Incline Barbell Press", sets: 6 }, { name: "Flat Barbell Press", sets: 6 }, { name: "Pec Deck", sets: 4 }, { name: "Push Ups", sets: 3 }, { name: "V-ups", sets: 4 }, { name: "Leg Raises", sets: 4 }, { name: "Leaning Oblique Crunches", sets: 4 }],
                    "Tuesday": [{ name: "Squats", sets: 6 }, { name: "Stiff Leg Deadlift", sets: 6 }, { name: "Leg Curl", sets: 4 }, { name: "Leg Press", sets: 6 }, { name: "Leg Extension", sets: 4 }, { name: "Standing Calf Raise", sets: 4 }, { name: "Seated Calf Raise", sets: 4 }],
                    "Wednesday": [{ name: "High Row Wide Grip", sets: 6 }, { name: "Close Grip Low Row", sets: 6 }, { name: "Wide Grip Pull Downs", sets: 6 }, { name: "Dumbbell Pullovers", sets: 4 }, { name: "Barbell Shrugs", sets: 6 }, { name: "Hyperextensions", sets: 4 }],
                    "Friday": [{ name: "Dumbbell Curls", sets: 6 }, { name: "Preacher Curls", sets: 6 }, { name: "Concentration Curls", sets: 3 }, { name: "Close Grip Press", sets: 6 }, { name: "V-Bar Press Down", sets: 6 }, { name: "Single Arm Over Head Ext", sets: 3 }, { name: "Toe Touches", sets: 4 }, { name: "Roman Chair Knee Ups", sets: 4 }, { name: "Cable Wood Chops", sets: 4 }],
                    "Saturday": [{ name: "Dumbbell Military Press", sets: 6 }, { name: "Front DB Raise", sets: 6 }, { name: "Side Lateral Raise", sets: 6 }, { name: "Rear Delt Machine", sets: 6 }, { name: "Standing Calf Raise", sets: 4 }, { name: "Seated Calf Raise", sets: 4 }]
                }},
                3: { title: "Strength", targetReps: "4-6", workouts: {
                    "Monday": [{ name: "Incline Barbell Press", sets: 6 }, { name: "Flat Barbell Press", sets: 6 }, { name: "Dumbbell Flyes", sets: 4 }, { name: "Push Ups", sets: 3 }, { name: "Crunches", sets: 4 }, { name: "Reverse Crunches", sets: 4 }, { name: "Leaning Oblique Crunches", sets: 4 }],
                    "Tuesday": [{ name: "Squats", sets: 6 }, { name: "Stiff Leg Deadlift", sets: 6 }, { name: "Leg Curl", sets: 4 }, { name: "Leg Press", sets: 6 }, { name: "Leg Extension", sets: 4 }, { name: "Standing Calf Raise", sets: 4 }, { name: "Seated Calf Raise", sets: 4 }],
                    "Wednesday": [{ name: "Barbell Rows", sets: 6 }, { name: "One Arm Dumbbell Rows", sets: 6 }, { name: "Cable Pull Downs", sets: 4 }, { name: "Wide Grip Pull Downs", sets: 6 }, { name: "Dumbbell Shrugs", sets: 6 }, { name: "Hyperextensions", sets: 4 }],
                    "Friday": [{ name: "Barbell Curls", sets: 6 }, { name: "Preacher Curls", sets: 6 }, { name: "Hammer Curls", sets: 3 }, { name: "Triceps Press Down", sets: 6 }, { name: "Overhead Extension", sets: 6 }, { name: "Weighted Dips", sets: 3 }, { name: "V-Ups", sets: 4 }, { name: "Leg Raises", sets: 4 }, { name: "Cable Wood Chops", sets: 4 }],
                    "Saturday": [{ name: "Overhead Press", sets: 6 }, { name: "DB Front Raise", sets: 6 }, { name: "Side Lateral Raise", sets: 5 }, { name: "Rear Delt Fly", sets: 6 }, { name: "Standing Calf Raise", sets: 4 }, { name: "Seated Calf Raise", sets: 4 }]
                }}
            };

            const repDotColor = (avgReps, phase) => {
                const ranges = { 1: [12, 15], 2: [6, 10], 3: [4, 6] };
                const [min, max] = ranges[phase];
                if (avgReps < min) return '#ef4444';
                if (avgReps > max) return '#3b82f6';
                return '#22c55e';
            };

            const SubBadge = ({ isOriginalOfSwap, isHistoricalSub }) => {
                if (isOriginalOfSwap) return <span className="text-[9px] font-black px-1.5 py-0.5 bg-slate-100 dark:bg-slate-700 text-slate-500 rounded uppercase shrink-0">ORIG</span>;
                if (isHistoricalSub) return <span className="text-[9px] font-black px-1.5 py-0.5 bg-blue-100 dark:bg-blue-900/40 text-blue-600 dark:text-blue-400 rounded uppercase shrink-0">SUB</span>;
                return null;
            };

            const StatCardA = ({ exStat, darkMode }) => {
                const { name, sessions, bestWeight, firstAvgWeight, lastAvgWeight, trend, avgData, isOriginalOfSwap, isHistoricalSub, substituteFor } = exStat;
                const faded = isOriginalOfSwap || isHistoricalSub;
                return (
                    <div className={`bg-white dark:bg-slate-900 p-4 rounded-3xl shadow-sm border ${faded ? 'border-slate-200 dark:border-slate-700 opacity-75' : 'border-slate-100 dark:border-slate-800'}`}>
                        <div className="flex items-center justify-between mb-3">
                            <h3 className="text-sm font-black text-slate-800 dark:text-slate-100 uppercase flex items-center gap-2 min-w-0 flex-1">
                                <Icons.Dumbbell /><span className="truncate">{name}</span>
                            </h3>
                            <SubBadge isOriginalOfSwap={isOriginalOfSwap} isHistoricalSub={isHistoricalSub} />
                        </div>
                        {isOriginalOfSwap && <p className="text-[10px] text-slate-400 -mt-2 mb-3 ml-6">replaced by {substituteFor}</p>}
                        {sessions > 0 ? (
                            <div className="space-y-3">
                                <div className="grid grid-cols-3 gap-2">
                                    <div className="bg-slate-50 dark:bg-slate-800 rounded-2xl p-3 text-center">
                                        <div className="text-lg font-black text-slate-800 dark:text-white">{sessions}</div>
                                        <div className="text-[9px] font-bold text-slate-400 uppercase">Sessions</div>
                                    </div>
                                    <div className="bg-slate-50 dark:bg-slate-800 rounded-2xl p-3 text-center">
                                        <div className="text-lg font-black text-slate-800 dark:text-white">{bestWeight}</div>
                                        <div className="text-[9px] font-bold text-slate-400 uppercase">Best lbs</div>
                                    </div>
                                    <div className={`rounded-2xl p-3 text-center ${trend >= 0 ? 'bg-green-50 dark:bg-green-950/60' : 'bg-red-50 dark:bg-red-950/60'}`}>
                                        <div className={`text-lg font-black ${trend >= 0 ? 'text-green-600 dark:text-green-400' : 'text-red-500'}`}>{trend > 0 ? '+' : ''}{trend}%</div>
                                        <div className="text-[9px] font-bold text-slate-400 uppercase">Progress</div>
                                    </div>
                                </div>
                                {sessions > 1 && (
                                    <div className="flex items-center gap-2">
                                        <span className="text-[11px] font-bold text-slate-400 shrink-0">{firstAvgWeight}</span>
                                        <div className="flex-1 h-2 bg-slate-100 dark:bg-slate-800 rounded-full overflow-hidden">
                                            <div className="h-full bg-gradient-to-r from-red-400 to-red-600 rounded-full" style={{width:`${Math.min(100,Math.max(8,(trend/35)*100))}%`}} />
                                        </div>
                                        <span className="text-[11px] font-black text-slate-800 dark:text-white shrink-0">{lastAvgWeight} lbs</span>
                                    </div>
                                )}
                                {avgData.length > 0 && (
                                    <div className="text-[10px] text-slate-500 dark:text-slate-400 bg-slate-50 dark:bg-slate-800 rounded-xl px-3 py-2">
                                        <span className="font-black text-slate-600 dark:text-slate-300">Last ({avgData[avgData.length-1].date}):</span>{' '}
                                        {avgData[avgData.length-1].peakWeight} lbs peak · {avgData[avgData.length-1].avgReps} avg reps
                                    </div>
                                )}
                            </div>
                        ) : (
                            <div className="text-slate-400 text-xs font-bold uppercase text-center py-6">No data yet</div>
                        )}
                    </div>
                );
            };

            const StatCardB = ({ exStat, phase, darkMode }) => {
                const { name, sessions, avgData, isOriginalOfSwap, isHistoricalSub, substituteFor } = exStat;
                const faded = isOriginalOfSwap || isHistoricalSub;
                return (
                    <div className={`bg-white dark:bg-slate-900 p-4 rounded-3xl shadow-sm border ${faded ? 'border-slate-200 dark:border-slate-700 opacity-75' : 'border-slate-100 dark:border-slate-800'}`}>
                        <div className="flex items-center justify-between mb-1">
                            <h3 className="text-sm font-black text-slate-800 dark:text-slate-100 uppercase flex items-center gap-2 min-w-0 flex-1">
                                <Icons.Dumbbell /><span className="truncate">{name}</span>
                            </h3>
                            <SubBadge isOriginalOfSwap={isOriginalOfSwap} isHistoricalSub={isHistoricalSub} />
                        </div>
                        {isOriginalOfSwap && <p className="text-[10px] text-slate-400 mb-1 ml-6">replaced by {substituteFor}</p>}
                        <div className="flex gap-3 text-[9px] font-bold mb-2">
                            <span className="text-red-500">● below</span>
                            <span className="text-green-500">● in range</span>
                            <span className="text-blue-500">● increase wt</span>
                        </div>
                        {sessions > 0 ? (
                            <div className="h-40">
                                <ResponsiveContainer width="100%" height="100%">
                                    <LineChart data={avgData} margin={{top:4,right:8,left:-20,bottom:0}}>
                                        <CartesianGrid strokeDasharray="3 3" vertical={false} stroke={darkMode ? '#1e293b' : '#f1f5f9'} />
                                        <XAxis dataKey="date" fontSize={9} tickLine={false} axisLine={false} tick={{ fill: darkMode ? '#94a3b8' : '#64748b' }} />
                                        <YAxis domain={['auto','auto']} fontSize={9} tickLine={false} axisLine={false} tick={{ fill: darkMode ? '#94a3b8' : '#64748b' }} />
                                        <Tooltip contentStyle={{borderRadius:'12px',border:'none',fontSize:11,backgroundColor:darkMode?'#1e293b':'#fff',color:darkMode?'#e2e8f0':'#000'}}
                                            formatter={(v) => [`${v} lbs`,'Avg Weight']}
                                            labelFormatter={(l) => { const d = avgData.find(x => x.date===l); return d ? `${l} · ${d.avgReps} avg reps` : l; }} />
                                        <Line type="monotone" dataKey="avgWeight" stroke="#ef4444" strokeWidth={2}
                                            dot={(props) => { const {cx,cy,payload}=props; if(cx==null) return null; const c=repDotColor(payload.avgReps,phase); return <circle key={`${cx}${cy}`} cx={cx} cy={cy} r={5} fill={c} stroke={darkMode?'#0f172a':'white'} strokeWidth={1.5}/>; }} />
                                    </LineChart>
                                </ResponsiveContainer>
                            </div>
                        ) : (
                            <div className="flex items-center justify-center h-40 text-slate-400 text-xs font-bold uppercase">No data yet</div>
                        )}
                    </div>
                );
            };

            const StatCPanel = ({ stats, phase, darkMode }) => {
                const [expanded, setExpanded] = React.useState(null);
                return (
                    <div className="bg-white dark:bg-slate-900 rounded-3xl shadow-sm border border-slate-100 dark:border-slate-800 overflow-hidden">
                        <div className="grid px-4 py-2 bg-slate-50 dark:bg-slate-800/80" style={{gridTemplateColumns:'1fr 48px 72px 52px'}}>
                            <div className="text-[9px] font-black text-slate-400 uppercase">Exercise</div>
                            <div className="text-[9px] font-black text-slate-400 uppercase text-center">Sess.</div>
                            <div className="text-[9px] font-black text-slate-400 uppercase text-right">Best</div>
                            <div className="text-[9px] font-black text-slate-400 uppercase text-right">Trend</div>
                        </div>
                        {stats.map((exStat, i) => {
                            const { name, sessions, bestWeight, trend, avgData, isOriginalOfSwap, isHistoricalSub } = exStat;
                            const rowKey = `${name}-${isOriginalOfSwap}-${isHistoricalSub}`;
                            const isExp = expanded === rowKey;
                            return (
                                <div key={rowKey}>
                                    <button
                                        onClick={() => setExpanded(isExp ? null : rowKey)}
                                        className={`w-full grid px-4 py-3 text-left transition-colors active:bg-slate-50 dark:active:bg-slate-800 ${isOriginalOfSwap || isHistoricalSub ? 'opacity-60' : ''}`}
                                        style={{gridTemplateColumns:'1fr 48px 72px 52px'}}
                                    >
                                        <div className="min-w-0 pr-2">
                                            <div className="text-[11px] font-black text-slate-800 dark:text-slate-100 uppercase truncate">{name}</div>
                                            {isOriginalOfSwap && <div className="text-[9px] font-bold text-slate-400">ORIG</div>}
                                            {isHistoricalSub && <div className="text-[9px] font-bold text-blue-500">SUB</div>}
                                        </div>
                                        <div className="flex items-center justify-center text-xs font-bold text-slate-500">{sessions > 0 ? sessions : '—'}</div>
                                        <div className="flex items-center justify-end text-xs font-black text-slate-800 dark:text-white">{bestWeight > 0 ? `${bestWeight} lbs` : '—'}</div>
                                        <div className={`flex items-center justify-end text-xs font-black ${trend > 0 ? 'text-green-500' : trend < 0 ? 'text-red-500' : 'text-slate-400'}`}>
                                            {sessions > 1 ? `${trend > 0 ? '▲' : '▼'}${Math.abs(trend)}%` : '—'}
                                        </div>
                                    </button>
                                    {isExp && sessions > 0 && (
                                        <div className="px-4 pb-4 bg-slate-50/60 dark:bg-slate-800/40">
                                            <div className="h-36">
                                                <ResponsiveContainer width="100%" height="100%">
                                                    <LineChart data={avgData} margin={{top:4,right:8,left:-20,bottom:0}}>
                                                        <CartesianGrid strokeDasharray="3 3" vertical={false} stroke={darkMode ? '#1e293b' : '#f1f5f9'} />
                                                        <XAxis dataKey="date" fontSize={9} tickLine={false} axisLine={false} tick={{ fill: darkMode ? '#94a3b8' : '#64748b' }} />
                                                        <YAxis domain={['auto','auto']} fontSize={9} tickLine={false} axisLine={false} tick={{ fill: darkMode ? '#94a3b8' : '#64748b' }} />
                                                        <Tooltip contentStyle={{borderRadius:'12px',border:'none',fontSize:11,backgroundColor:darkMode?'#1e293b':'#fff',color:darkMode?'#e2e8f0':'#000'}}
                                                            formatter={(v) => [`${v} lbs`,'Avg Wt']}
                                                            labelFormatter={(l) => { const d = avgData.find(x => x.date===l); return d ? `${l} · ${d.avgReps} avg reps` : l; }} />
                                                        <Line type="monotone" dataKey="avgWeight" stroke="#ef4444" strokeWidth={2}
                                                            dot={(props) => { const {cx,cy,payload}=props; if(cx==null) return null; const c=repDotColor(payload.avgReps,phase); return <circle key={`${cx}${cy}`} cx={cx} cy={cy} r={4} fill={c} stroke={darkMode?'#0f172a':'white'} strokeWidth={1}/>; }} />
                                                    </LineChart>
                                                </ResponsiveContainer>
                                            </div>
                                            <div className="flex gap-3 text-[9px] font-bold mt-1">
                                                <span className="text-red-500">● below</span>
                                                <span className="text-green-500">● in range</span>
                                                <span className="text-blue-500">● increase wt</span>
                                            </div>
                                        </div>
                                    )}
                                    {i < stats.length - 1 && <div className="border-t border-slate-100 dark:border-slate-800 mx-4" />}
                                </div>
                            );
                        })}
                    </div>
                );
            };

            const StatCardD = ({ exStat, phase, darkMode }) => {
                const { name, sessions, sessionLog, isOriginalOfSwap, isHistoricalSub, substituteFor } = exStat;
                const [showAll, setShowAll] = React.useState(false);
                const ranges = { 1: [12, 15], 2: [6, 10], 3: [4, 6] };
                const [min, max] = ranges[phase];
                const displayed = showAll ? sessionLog : sessionLog.slice(0, 3);
                const faded = isOriginalOfSwap || isHistoricalSub;
                return (
                    <div className={`bg-white dark:bg-slate-900 p-4 rounded-3xl shadow-sm border ${faded ? 'border-slate-200 dark:border-slate-700 opacity-75' : 'border-slate-100 dark:border-slate-800'}`}>
                        <div className="flex items-center justify-between mb-1">
                            <h3 className="text-sm font-black text-slate-800 dark:text-slate-100 uppercase flex items-center gap-2 min-w-0 flex-1">
                                <Icons.Dumbbell /><span className="truncate">{name}</span>
                            </h3>
                            {faded
                                ? <SubBadge isOriginalOfSwap={isOriginalOfSwap} isHistoricalSub={isHistoricalSub} />
                                : sessions > 0 && <span className="text-[10px] font-bold text-slate-400 shrink-0">{sessions} sessions</span>}
                        </div>
                        {isOriginalOfSwap && <p className="text-[10px] text-slate-400 mb-2 ml-6">replaced by {substituteFor}</p>}
                        {sessions > 0 ? (
                            <div className="space-y-3 mt-2">
                                {displayed.map(({ date, entries }) => (
                                    <div key={date}>
                                        <div className="text-[10px] font-black text-slate-400 uppercase mb-1.5">{date.slice(5)}</div>
                                        <div className="flex gap-1.5">
                                            {entries.map((entry, i) => {
                                                const rc = entry.r < min
                                                    ? 'bg-red-100 dark:bg-red-900/40 text-red-700 dark:text-red-400'
                                                    : entry.r > max
                                                    ? 'bg-blue-100 dark:bg-blue-900/40 text-blue-700 dark:text-blue-400'
                                                    : 'bg-green-100 dark:bg-green-900/40 text-green-700 dark:text-green-400';
                                                return (
                                                    <div key={i} className="flex-1 text-center bg-slate-50 dark:bg-slate-800 rounded-xl p-2">
                                                        <div className="text-[11px] font-black text-slate-700 dark:text-slate-200 leading-none mb-1">{entry.w}</div>
                                                        <div className={`text-[10px] font-black rounded-lg px-0.5 py-0.5 ${rc}`}>{entry.r}r</div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                ))}
                                {sessionLog.length > 3 && (
                                    <button onClick={() => setShowAll(!showAll)} className="text-[10px] text-red-500 font-black w-full text-center py-1">
                                        {showAll ? '▲ Show less' : `▼ Show ${sessionLog.length - 3} more sessions`}
                                    </button>
                                )}
                            </div>
                        ) : (
                            <div className="text-slate-400 text-xs font-bold uppercase text-center py-6">No data yet</div>
                        )}
                    </div>
                );
            };

            function App() {
                const [view, setView] = useState('workout');
                const [phase, setPhase] = useState(1);
                const [day, setDay] = useState('Monday');
                const [logs, setLogs] = useState({});
                const [history, setHistory] = useState([]);
                const [toast, setToast] = useState(null);
                const [darkMode, setDarkMode] = useState(() => localStorage.getItem(`${APP_ID}_darkMode`) === 'true');
                const [showSettings, setShowSettings] = useState(false);
                const [customExercises, setCustomExercises] = useState(() => {
                    const saved = localStorage.getItem(`${APP_ID}_customExercises`);
                    return saved ? JSON.parse(saved) : [];
                });
                const [swaps, setSwaps] = useState({});
                const [swapTarget, setSwapTarget] = useState(null);
                const [statsView, setStatsView] = useState('A');

                const getSuggestedWeight = (phase, day, effectiveName, setNum) => {
                    const logKey = `${phase}-${day}-${effectiveName}-s${setNum}`;
                    const matches = history
                        .filter(h => h.key === logKey && h.w)
                        .sort((a, b) => b.date.localeCompare(a.date));
                    return matches.length > 0 ? matches[0].w : null;
                };

                useEffect(() => {
                    localStorage.setItem(`${APP_ID}_darkMode`, darkMode);
                    document.documentElement.classList.toggle('dark', darkMode);
                    document.querySelector('meta[name="theme-color"]').setAttribute('content', darkMode ? '#020617' : '#0f172a');
                }, [darkMode]);

                useEffect(() => {
                    const savedLogs = localStorage.getItem(`${APP_ID}_logs`);
                    const savedHistory = localStorage.getItem(`${APP_ID}_history`);
                    const savedSwaps = localStorage.getItem(`${APP_ID}_swaps`);
                    const hasSaved = localStorage.getItem(`${APP_ID}_saved`);
                    if (hasSaved) {
                        localStorage.removeItem(`${APP_ID}_saved`);
                    } else {
                        if (savedLogs) setLogs(JSON.parse(savedLogs));
                        if (savedSwaps) setSwaps(JSON.parse(savedSwaps));
                    }
                    if (savedHistory) setHistory(JSON.parse(savedHistory));
                }, []);

                useEffect(() => {
                    localStorage.setItem(`${APP_ID}_logs`, JSON.stringify(logs));
                }, [logs]);

                useEffect(() => {
                    localStorage.setItem(`${APP_ID}_swaps`, JSON.stringify(swaps));
                    if (window.Capacitor && window.Capacitor.Plugins.WearPlugin) {
                        window.Capacitor.Plugins.WearPlugin.syncSwaps({
                            swaps: JSON.stringify(swaps),
                            customExercises: JSON.stringify(customExercises)
                        }).catch(() => {});
                    }
                }, [swaps]);

                useEffect(() => {
                    localStorage.setItem(`${APP_ID}_customExercises`, JSON.stringify(customExercises));
                    if (window.Capacitor && window.Capacitor.Plugins.WearPlugin) {
                        window.Capacitor.Plugins.WearPlugin.syncSwaps({
                            swaps: JSON.stringify(swaps),
                            customExercises: JSON.stringify(customExercises)
                        }).catch(() => {});
                    }
                }, [customExercises]);

                // Sync history and swaps to SharedPreferences on app mount so watch works offline
                useEffect(() => {
                    if (window.Capacitor && window.Capacitor.Plugins.WearPlugin) {
                        const hist = JSON.parse(localStorage.getItem(`${APP_ID}_history`) || '[]');
                        window.Capacitor.Plugins.WearPlugin.syncHistory({
                            history: JSON.stringify(hist)
                        }).catch(() => {});
                        window.Capacitor.Plugins.WearPlugin.syncSwaps({
                            swaps: JSON.stringify(swaps),
                            customExercises: JSON.stringify(customExercises)
                        }).catch(() => {});
                    }
                }, []);

                // Listen for events from Wear OS watch
                useEffect(() => {
                    if (window.Capacitor && window.Capacitor.Plugins.WearPlugin) {
                        const setLogHandler = (event) => {
                            try {
                                const setData = JSON.parse(event.data);
                                const logKey = `${setData.phase}-${setData.day}-${setData.exerciseName}-s${setData.setNum}`;
                                setLogs(prev => ({...prev, [logKey]: { w: setData.weight, r: setData.reps }}));
                                const entry = { key: logKey, w: setData.weight, r: setData.reps, date: setData.date };
                                setHistory(prev => {
                                    const newHist = [...prev, entry];
                                    localStorage.setItem(`${APP_ID}_history`, JSON.stringify(newHist));
                                    return newHist;
                                });
                            } catch(e) {}
                        };
                        const swapHandler = (event) => {
                            try {
                                const { phase, day, originalName, newName } = event;
                                const swapKey = `${phase}-${day}-${originalName}`;
                                setSwaps(prev => {
                                    const updated = { ...prev };
                                    if (newName === '') delete updated[swapKey];
                                    else updated[swapKey] = newName;
                                    localStorage.setItem(`${APP_ID}_swaps`, JSON.stringify(updated));
                                    return updated;
                                });
                            } catch(e) {}
                        };
                        window.Capacitor.Plugins.WearPlugin.addListener('setLoggedFromWatch', setLogHandler);
                        window.Capacitor.Plugins.WearPlugin.addListener('swapFromWatch', swapHandler);
                        return () => window.Capacitor.Plugins.WearPlugin.removeAllListeners();
                    }
                }, []);

                // Swap handler functions
                const openSwap = (phase, day, originalName) => {
                    const swapKey = `${phase}-${day}-${originalName}`;
                    setSwapTarget({ phase, day, originalName, isSwapped: !!swaps[swapKey] });
                };
                const closeSwap = () => setSwapTarget(null);
                const selectSwap = (originalName, substituteName) => {
                    setSwaps({ ...swaps, [`${swapTarget.phase}-${swapTarget.day}-${originalName}`]: substituteName });
                    setSwapTarget(null);
                };
                const restoreSwap = () => {
                    const newSwaps = { ...swaps };
                    delete newSwaps[`${swapTarget.phase}-${swapTarget.day}-${swapTarget.originalName}`];
                    setSwaps(newSwaps);
                    setSwapTarget(null);
                };
                const addCustomExercise = (name) => {
                    if (!customExercises.includes(name)) {
                        setCustomExercises([...customExercises, name]);
                    }
                };
                const removeCustomExercise = (name) => {
                    setCustomExercises(customExercises.filter(n => n !== name));
                    const newSwaps = { ...swaps };
                    Object.keys(newSwaps).forEach(key => {
                        if (newSwaps[key] === name) delete newSwaps[key];
                    });
                    setSwaps(newSwaps);
                };

                const saveSession = () => {
                    const timestamp = new Date().toISOString();
                    const sessionEntries = Object.entries(logs).map(([key, data]) => ({
                        ...data,
                        key,
                        date: timestamp.split('T')[0]
                    })).filter(entry => entry.w && entry.r);

                    const newHistory = [...history, ...sessionEntries];
                    setHistory(newHistory);
                    localStorage.setItem(`${APP_ID}_history`, JSON.stringify(newHistory));
                    localStorage.setItem(`${APP_ID}_saved`, 'true');
                    setToast("PROGRESS SAVED");
                    setTimeout(() => setToast(null), 2000);
                    // Sync history to Wear OS companion app
                    if (window.Capacitor && window.Capacitor.Plugins.WearPlugin) {
                        window.Capacitor.Plugins.WearPlugin.syncHistory({
                            history: JSON.stringify(newHistory)
                        }).catch(() => {});
                    }
                };

                const clearData = () => {
                    if (confirm("Permanently delete all workout history?")) {
                        setLogs({}); setHistory([]); setSwaps({});
                        localStorage.removeItem(`${APP_ID}_logs`);
                        localStorage.removeItem(`${APP_ID}_history`);
                        localStorage.removeItem(`${APP_ID}_swaps`);
                        window.location.reload();
                    }
                };

                const allExerciseStats = useMemo(() => {
                    const exercises = programData[phase].workouts[day];
                    const getStatsForName = (name) => {
                        const filtered = history.filter(h => h.key.startsWith(`${phase}-`) && h.key.includes(`-${name}-`));
                        if (filtered.length === 0) return { name, avgData: [], setData: [], sessionLog: [], sessions: 0, bestWeight: 0, firstAvgWeight: 0, lastAvgWeight: 0, trend: 0 };
                        const byDate = {};
                        filtered.forEach(h => {
                            if (!byDate[h.date]) byDate[h.date] = [];
                            byDate[h.date].push({ w: parseFloat(h.w), r: parseFloat(h.r) });
                        });
                        const avgData = Object.entries(byDate).map(([date, entries]) => ({
                            date: date.slice(5),
                            avgWeight: Math.round((entries.reduce((s, e) => s + e.w, 0) / entries.length) * 10) / 10,
                            peakWeight: Math.max(...entries.map(e => e.w)),
                            avgReps: Math.round((entries.reduce((s, e) => s + e.r, 0) / entries.length) * 10) / 10
                        })).sort((a, b) => a.date.localeCompare(b.date));
                        const setData = filtered.map(h => ({ date: h.date.slice(5), weight: parseFloat(h.w), reps: parseFloat(h.r) })).sort((a, b) => a.date.localeCompare(b.date));
                        const sessionLog = Object.entries(byDate).sort((a, b) => b[0].localeCompare(a[0])).map(([date, entries]) => ({ date, entries }));
                        const bestWeight = Math.max(...filtered.map(h => parseFloat(h.w)));
                        const sessions = Object.keys(byDate).length;
                        const firstAvgWeight = avgData[0]?.avgWeight || 0;
                        const lastAvgWeight = avgData[avgData.length - 1]?.avgWeight || 0;
                        const trend = firstAvgWeight > 0 ? Math.round(((lastAvgWeight - firstAvgWeight) / firstAvgWeight) * 100) : 0;
                        return { name, avgData, setData, sessionLog, sessions, bestWeight, firstAvgWeight, lastAvgWeight, trend };
                    };

                    const result = [];
                    exercises.forEach(ex => {
                        const effectiveName = getEffectiveName(phase, day, ex.name, swaps);
                        const isSwapped = effectiveName !== ex.name;
                        result.push(getStatsForName(effectiveName));
                        if (isSwapped) {
                            const origStats = getStatsForName(ex.name);
                            if (origStats.avgData.length > 0) {
                                result.push({ ...origStats, isOriginalOfSwap: true, substituteFor: effectiveName });
                            }
                        }
                    });

                    // Also surface any exercise that was ever logged on this phase/day
                    // but isn't currently in the program or active swap list
                    const includedNames = new Set(result.map(r => r.name));
                    const prefix = `${phase}-${day}-`;
                    const historyNames = new Set();
                    history.forEach(h => {
                        if (h.key.startsWith(prefix)) {
                            const exerciseName = h.key.slice(prefix.length).replace(/-s\d+$/, '');
                            historyNames.add(exerciseName);
                        }
                    });
                    historyNames.forEach(name => {
                        if (!includedNames.has(name)) {
                            const stats = getStatsForName(name);
                            if (stats.sessions > 0) {
                                result.push({ ...stats, isHistoricalSub: true });
                            }
                        }
                    });

                    return result;
                }, [history, phase, day, swaps]);

                return (
                    <div className="min-h-screen pb-24 font-sans max-w-md mx-auto relative bg-slate-50 dark:bg-slate-950">
                        {toast && <div className="fixed top-8 left-1/2 -translate-x-1/2 bg-red-600 text-white px-6 py-3 rounded-full font-bold shadow-2xl z-50 animate-bounce">{toast}</div>}

                        <header className="bg-slate-900 text-white p-6 pt-10 flex justify-between items-end">
                            <div>
                                <h1 className="text-3xl font-black italic uppercase tracking-tighter">Game Over</h1>
                                <p className="text-[10px] text-red-500 font-bold uppercase mt-2 tracking-widest">Strength Tracker</p>
                            </div>
                            <div className="flex items-center gap-1">
                                <div className="relative">
                                    <button onClick={() => setShowSettings(!showSettings)} className="text-slate-500 hover:text-slate-300 p-2"><Icons.Gear /></button>
                                    {showSettings && (
                                        <>
                                            <div className="fixed inset-0 z-40" onClick={() => setShowSettings(false)} />
                                            <div className="absolute right-0 top-full mt-2 bg-white dark:bg-slate-800 rounded-2xl shadow-xl p-4 z-50 w-48">
                                                <div className="flex items-center justify-between">
                                                    <span className="text-sm font-bold text-slate-700 dark:text-slate-200">Dark Mode</span>
                                                    <button onClick={() => setDarkMode(!darkMode)} className={`w-12 h-7 rounded-full transition-colors relative ${darkMode ? 'bg-red-600' : 'bg-slate-300'}`}>
                                                        <span className={`absolute top-0.5 w-6 h-6 bg-white rounded-full shadow transition-transform ${darkMode ? 'left-[22px]' : 'left-0.5'}`} />
                                                    </button>
                                                </div>
                                                <div className="mt-3 pt-3 border-t border-slate-200 dark:border-slate-700">
                                                    <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">{`v${APP_VERSION}`}</span>
                                                </div>
                                            </div>
                                        </>
                                    )}
                                </div>
                                <button onClick={clearData} className="text-slate-500 hover:text-red-500 p-2"><Icons.Trash /></button>
                            </div>
                        </header>
                        
                        <nav className="flex bg-white dark:bg-slate-900 sticky top-0 z-20 shadow-sm">
                            {[1, 2, 3].map(p => (
                                <button key={p} onClick={() => setPhase(p)} className={`flex-1 py-4 text-xs font-black uppercase border-b-4 transition-colors ${phase === p ? 'border-red-600 text-red-600' : 'border-transparent text-slate-400'}`}>Phase {p}</button>
                            ))}
                        </nav>

                        {view === 'workout' ? (
                            <div className="p-4 space-y-4">
                                <div className="relative">
                                    <select value={day} onChange={(e) => setDay(e.target.value)} className="w-full p-4 bg-white dark:bg-slate-900 dark:text-white rounded-2xl border-none shadow-sm text-lg font-bold appearance-none">
                                        {Object.keys(programData[phase].workouts).map(d => <option key={d} value={d}>{d}</option>)}
                                    </select>
                                    <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400"><Icons.Chevron /></div>
                                </div>

                                {programData[phase].workouts[day].map((ex) => {
                                    const effectiveName = getEffectiveName(phase, day, ex.name, swaps);
                                    const isSwapped = effectiveName !== ex.name;
                                    return (
                                    <div key={ex.name} className="bg-white dark:bg-slate-900 p-5 rounded-3xl shadow-sm border border-slate-100 dark:border-slate-800">
                                        <div className="flex justify-between items-start mb-4">
                                            <div className="flex-1 pr-2">
                                                <button onClick={() => openSwap(phase, day, ex.name)} className="text-sm font-black text-slate-800 dark:text-slate-100 uppercase flex items-center gap-2 text-wrap text-left active:text-red-600 transition-colors">
                                                    <Icons.Dumbbell /> {effectiveName}
                                                    {isSwapped && <span className="text-[9px] font-black px-1.5 py-0.5 bg-amber-100 dark:bg-amber-900 text-amber-600 dark:text-amber-400 rounded uppercase shrink-0">SUB</span>}
                                                </button>
                                                {isSwapped && <p className="text-[10px] text-slate-400 mt-1 ml-6">instead of {ex.name}</p>}
                                            </div>
                                            <span className="text-[10px] font-black px-2 py-1 bg-slate-100 dark:bg-slate-800 rounded text-slate-500 dark:text-slate-400 uppercase shrink-0">{ex.sets} Sets</span>
                                        </div>
                                        <div className="space-y-3">
                                            {[...Array(ex.sets)].map((_, i) => {
                                                const s = i + 1;
                                                const logKey = `${phase}-${day}-${effectiveName}-s${s}`;
                                                const data = logs[logKey] || { w: '', r: '' };
                                                const suggested = getSuggestedWeight(phase, day, effectiveName, s);
                                                const repColorClass = getRepColorClass(phase, data.r);
                                                return (
                                                    <div key={s} className="flex gap-2 items-center">
                                                        <div className="w-8 h-8 flex items-center justify-center bg-slate-900 dark:bg-slate-700 rounded-lg text-[10px] font-black text-white shrink-0">S{s}</div>
                                                        <div className="flex-1 flex gap-2">
                                                            <input
                                                                type="number"
                                                                inputMode="decimal"
                                                                placeholder={suggested ? `${suggested}` : "Lbs"}
                                                                value={data.w}
                                                                onChange={(e) => setLogs({...logs, [logKey]: {...data, w: e.target.value}})}
                                                                className="w-full p-3 bg-slate-50 dark:bg-slate-800 dark:text-white rounded-xl text-center font-bold outline-none focus:ring-2 focus:ring-red-500 transition-all placeholder:text-slate-400 dark:placeholder:text-slate-400"
                                                            />
                                                            <input
                                                                type="number"
                                                                inputMode="numeric"
                                                                placeholder="Reps"
                                                                value={data.r}
                                                                onChange={(e) => setLogs({...logs, [logKey]: {...data, r: e.target.value}})}
                                                                className={`w-full p-3 rounded-xl text-center font-black outline-none focus:ring-2 focus:ring-red-500 transition-all placeholder:text-slate-300 dark:placeholder:text-slate-600 ${repColorClass}`}
                                                            />
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                    );
                                })}
                            </div>
                        ) : (
                            <div className="p-4 space-y-3">
                                <div className="relative">
                                    <select value={day} onChange={(e) => setDay(e.target.value)} className="w-full p-4 bg-white dark:bg-slate-900 dark:text-white rounded-2xl border-none shadow-sm text-lg font-bold appearance-none">
                                        {Object.keys(programData[phase].workouts).map(d => <option key={d} value={d}>{d}</option>)}
                                    </select>
                                    <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400"><Icons.Chevron /></div>
                                </div>

                                <div className="flex bg-white dark:bg-slate-900 rounded-2xl overflow-hidden shadow-sm">
                                    {[['A','Summary'],['B','Chart'],['C','Table'],['D','Log']].map(([id, label]) => (
                                        <button key={id} onClick={() => setStatsView(id)}
                                            className={`flex-1 py-2.5 text-[11px] font-black uppercase transition-colors ${statsView === id ? 'bg-red-600 text-white' : 'text-slate-400 dark:text-slate-500'}`}>
                                            {label}
                                        </button>
                                    ))}
                                </div>

                                {statsView === 'C' ? (
                                    <StatCPanel stats={allExerciseStats} phase={phase} darkMode={darkMode} />
                                ) : (
                                    allExerciseStats.map(exStat => {
                                        const key = `${exStat.name}-${exStat.isOriginalOfSwap}`;
                                        if (statsView === 'A') return <StatCardA key={key} exStat={exStat} darkMode={darkMode} />;
                                        if (statsView === 'B') return <StatCardB key={key} exStat={exStat} phase={phase} darkMode={darkMode} />;
                                        if (statsView === 'D') return <StatCardD key={key} exStat={exStat} phase={phase} darkMode={darkMode} />;
                                        return null;
                                    })
                                )}
                            </div>
                        )}

                        <div className="fixed bottom-0 left-0 right-0 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl border-t dark:border-slate-800 p-4 max-w-md mx-auto grid grid-cols-3 z-30">
                            <button onClick={() => setView('workout')} className={`flex flex-col items-center gap-1 transition-colors ${view === 'workout' ? 'text-red-600' : 'text-slate-400'}`}><Icons.Calendar /> <span className="text-[10px] font-black uppercase">Log</span></button>
                            <button onClick={saveSession} className="bg-red-600 text-white p-4 rounded-2xl shadow-lg -mt-8 flex justify-center active:scale-95 transition-all transform"><Icons.Save /></button>
                            <button onClick={() => setView('stats')} className={`flex flex-col items-center gap-1 transition-colors ${view === 'stats' ? 'text-red-600' : 'text-slate-400'}`}><Icons.BarChart3 /> <span className="text-[10px] font-black uppercase">Stats</span></button>
                        </div>

                        {swapTarget && (
                            <SwapPanel
                                target={swapTarget}
                                customExercises={customExercises}
                                dayExercises={programData[swapTarget.phase].workouts[swapTarget.day]}
                                onSelect={(name) => selectSwap(swapTarget.originalName, name)}
                                onRestore={restoreSwap}
                                onAddCustom={addCustomExercise}
                                onRemoveCustom={removeCustomExercise}
                                onClose={closeSwap}
                                darkMode={darkMode}
                            />
                        )}
                    </div>
                );
            }

            const rootElement = document.getElementById('root');
            const root = ReactDOM.createRoot(rootElement);
            root.render(<App />);
        };

        initApp();
    </script>
</body>
</html>
